<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Food Café - Premium Demo</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #121212; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg); color: white; margin: 0; }
        
        /* Logo Section */
        .header { text-align: center; padding: 30px; border-bottom: 2px solid var(--gold); }
        .logo { width: 100px; height: 100px; border: 2px solid var(--gold); border-radius: 50%; padding: 10px; }
        
        /* Tabs for Admin & Menu */
        .tabs { display: flex; justify-content: center; background: #111; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .tab-btn { background: none; border: none; color: white; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { border-bottom: 2px solid var(--gold); color: var(--gold); }

        .container { padding: 20px; display: block; }
        .admin-section { display: none; background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px dashed var(--gold); }

        /* Menu Items */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .item-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        .price { color: var(--gold); font-size: 22px; font-weight: bold; display: block; margin: 10px 0; }
        
        .wa-btn { background: #25D366; color: white; text-decoration: none; padding: 12px; border-radius: 30px; display: block; font-weight: bold; }
        
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: white; border: 1px solid #444; }
        .save-btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://via.placeholder.com/150?text=LOGO" class="logo" alt="Cafe Logo">
    <h1>DUBAI FOOD CAFÉ</h1>
    <p>Chowk Azam | 0308-8020784</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('menu')">🍴 CUSTOMER MENU</button>
    <button class="tab-btn" onclick="showTab('admin')">⚙️ ADMIN PANEL</button>
</div>

<div id="menu" class="container">
    <h2 style="color: var(--gold);">🔥 Featured Menu</h2>
    <div class="menu-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1594212699903-ec8a3ecc50f6?w=400" class="item-img">
            <div class="card-body">
                <h3>Special Zinger Burger</h3>
                <span class="price" id="p-zinger">Rs. 450</span>
                <a href="#" onclick="order('Special Zinger Burger', '450')" class="wa-btn">Order on WhatsApp</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" class="item-img">
            <div class="card-body">
                <h3>Small Pizza Deal</h3>
                <span class="price" id="p-pizza">Rs. 1250</span>
                <a href="#" onclick="order('Small Pizza Deal', '1250')" class="wa-btn">Order on WhatsApp</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=400" class="item-img">
            <div class="card-body">
                <h3>Mutton White Karahi</h3>
                <span class="price" id="p-mutton">Rs. 3500</span>
                <a href="#" onclick="order('Mutton White Karahi', '3500')" class="wa-btn">Order on WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<div id="admin" class="container admin-section">
    <h2>🛠 Admin Price Manager</h2>
    <p>یہاں سے آپ ڈیمو کے طور پر قیمتیں بدل کر چیک کریں:</p>
    <label>Select Item:</label>
    <select id="item-select">
        <option value="p-zinger">Special Zinger Burger</option>
        <option value="p-pizza">Small Pizza Deal</option>
        <option value="p-mutton">Mutton White Karahi</option>
    </select>
    <label>New Price (Rs.):</label>
    <input type="number" id="new-price-val" placeholder="Enter New Price">
    <button class="save-btn" onclick="updatePrice()">SAVE & UPDATE MENU</button>
</div>

<script>
    function showTab(tabId) {
        document.getElementById('menu').style.display = tabId === 'menu' ? 'block' : 'none';
        document.getElementById('admin').style.display = tabId === 'admin' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function updatePrice() {
        let itemId = document.getElementById('item-select').value;
        let newPrice = document.getElementById('new-price-val').value;
        if(newPrice) {
            document.getElementById(itemId).innerText = "Rs. " + newPrice;
            alert("قیمت کامیابی سے بدل گئی ہے! اب مینو میں جا کر چیک کریں۔");
            showTab('menu');
        }
    }

    function order(item, price) {
        let currentPrice = document.getElementById(item.toLowerCase().includes('zinger') ? 'p-zinger' : item.toLowerCase().includes('pizza') ? 'p-pizza' : 'p-mutton').innerText;
        let msg = `Salam Dubai Food Cafe! I want to order: ${item} (${currentPrice})`;
        window.open(`https://wa.me/923088020784?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
  </html>
